name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v4

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Create virtual environment
      run: uv venv .venv --python ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv pip install -e .[dev]

    - name: Lint with flake8
      run: uv run flake8 src tests

    - name: Format check with black
      run: uv run black --check src tests

    - name: Import sort check with isort
      run: uv run isort --check-only src tests

    - name: Type check with mypy
      run: uv run mypy src

    - name: Test with pytest
      run: uv run pytest --cov=src --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v4

    - name: Set up Python
      run: uv python install 3.13

    - name: Create virtual environment
      run: uv venv .venv --python 3.13

    - name: Install security tools
      run: |
        uv pip install bandit[toml] safety

    - name: Run bandit security linter
      run: |
        uv run bandit -r src/ -f json -o bandit-report.json || true
        uv run bandit -r src/

    - name: Run safety security checker
      run: |
        uv run safety check --json --output safety-report.json || true
        uv run safety check
