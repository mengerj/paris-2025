name: Auto Format

on:
  push:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 1'  # Run weekly on Monday at 2 AM

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort

    - name: Format code
      run: |
        black src tests
        isort src tests

    - name: Check for changes
      id: changes
      run: |
        if [[ -n $(git status --porcelain) ]]; then
          echo "changes=true" >> $GITHUB_OUTPUT
        else
          echo "changes=false" >> $GITHUB_OUTPUT
        fi

    - name: Create Pull Request
      if: steps.changes.outputs.changes == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "style: auto-format code with black and isort"
        title: "Auto-format code"
        body: |
          ## Auto-format code changes

          This PR was automatically created to format the code according to project standards.

          ### Changes made:
          - Applied black formatting
          - Applied isort import sorting

          ### Review checklist:
          - [ ] Verify formatting changes are correct
          - [ ] No functional changes introduced
          - [ ] All tests still pass

          Auto-generated by GitHub Actions.
        branch: auto-format
        delete-branch: true
